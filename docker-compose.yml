services:

  # ==================== 前端 (React + Nginx) ====================
  vnollx-web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: vnollx/vnollx-web:latest
    container_name: vnollx-web
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      vnollx:
        condition: service_started
    networks:
      - app-network

  # ==================== 后端 (Spring Boot 3.2 / Java 21) ====================
  vnollx:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: vnollx/vnollx:latest
    container_name: vnollx
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      go-judge:
        condition: service_started
    networks:
      - app-network

  # ==================== AI 代理 (Python FastAPI) ====================
  # 单机开发环境；生产环境建议国内/海外各部署一台，详见 docs/部署文档.md
  ai-proxy:
    build:
      context: .
      dockerfile: docker/ai-proxy.Dockerfile
    image: vnollx/ai-proxy:latest
    container_name: ai-proxy
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: ${MYSQL_PORT}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    restart: unless-stopped
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - app-network

  # ==================== MySQL ====================
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-master-data:/var/lib/mysql
    command:
      - --port=${MYSQL_PORT}
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-P", "${MYSQL_PORT}", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ==================== Redis ====================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # ==================== MinIO (对象存储) ====================
  minio:
    image: bitnami/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - app-network

  # ==================== RabbitMQ (消息队列) ====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ==================== Go-Judge (评测沙箱) ====================
  go-judge:
    image: criyle/go-judge:latest
    container_name: go-judge
    ports:
      - "5050:5050"
    privileged: true
    shm_size: 256m
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql-master-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  app-network:
    driver: bridge