spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: VnollxOnlineJudge
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:mysql-master}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:vnollxonlinejudge}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
          username: root
          password: ${MYSQL_ROOT_PASSWORD:rootpassword}
          type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:ab512888AB}
      timeout: 10000
      connect-timeout: 10000
      lettuce:
        pool:
          max-active: 100
          max-idle: 10
          min-idle: 5
        shutdown-timeout: 200
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    listener:
      simple:
        # 消费者并发应等于所有 judge-agent 端点 capacity 之和（当前 8+2=10）。
        # 设得更高会导致多余消费者从 MQ 预取消息后阻塞在 JudgeAgentRouter 许可上，
        # 反而扣留消息、降低吞吐。如果之后增减 agent 容量，记得同步调整这里。
        concurrency: 10
        max-concurrency: 10
        prefetch: 1
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:2720741614@qq.com}
    password: ${MAIL_PASSWORD:jfccwlsdynqfdchg}
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

minio:
  # 多 MinIO 端点：第一个为主端点（生成头像/图片 URL、读取走主），
  # 题目测试数据 zip 和 checker.cpp 上传 / 删除时会向所有端点双写，
  # 保证多台评测机的本机 MinIO 内容一致。
  endpoints:
    - url: ${MINIO_PRIMARY_URL:http://111.230.105.54:9000}
      access-key: ${MINIO_PRIMARY_ACCESS_KEY:vnollxvnollx}
      secret-key: ${MINIO_PRIMARY_SECRET_KEY:vnollxvnollxvnollx}
    - url: ${MINIO_SECONDARY_URL:http://42.193.130.159:9000}
      access-key: ${MINIO_SECONDARY_ACCESS_KEY:vnollxvnollx}
      secret-key: ${MINIO_SECONDARY_SECRET_KEY:vnollxvnollxvnollx}

judge-agent:
  # 多 judge-agent 端点加权限流：每个端点配 capacity（该 Agent 同时承载的评测数）。
  # 评测进来时按 capacity 从大到小尝试占用，全满则阻塞等大端点释放。
  # 每台评测机同机部署 MinIO + judge-agent + go-judge，Agent 承担全部评测业务逻辑。
  endpoints:
    # 大机器（3G 内存）
    - url: ${JUDGE_AGENT_REMOTE_ENDPOINT:http://42.193.130.159:8090}
      capacity: ${JUDGE_AGENT_REMOTE_CAPACITY:8}
    # 小机器（1G 内存）
    - url: ${JUDGE_AGENT_LOCAL_ENDPOINT:http://111.230.105.54:8090}
      capacity: ${JUDGE_AGENT_LOCAL_CAPACITY:2}
  default-capacity: 2

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.vnollxonlinejudge.model.entity
  configuration:
    default-executor-type: batch
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# AI 代理配置（按模型 proxy_type 选择：国内走 domestic，国外走 overseas）
ai:
  proxy:
    domestic:
      url: ${AI_PROXY_DOMESTIC_URL:http://111.230.105.54:8000}
    overseas:
      url: ${AI_PROXY_OVERSEAS_URL:http://103.117.122.213:8000}
    timeout: ${AI_PROXY_TIMEOUT:300}

# Resilience4j 熔断配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      judgeService:
        baseConfig: default
        slidingWindowSize: 20
        failureRateThreshold: 60
      aiService:
        baseConfig: default
        failureRateThreshold: 40
        waitDurationInOpenState: 120s
