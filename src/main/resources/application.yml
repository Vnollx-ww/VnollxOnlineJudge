spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: VnollxOnlineJudge
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://111.230.105.54:3308/vnollxonlinejudge?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
          username: root
          password: rootpassword
          type: com.alibaba.druid.pool.DruidDataSource
        slave:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://mysql-slave:3309/vnollxonlinejudge?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
          username: root
          password: rootpassword
          type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: 111.230.105.54
      port: 6379
      timeout: 10000
      connect-timeout: 10000
      lettuce:
        pool:
          max-active: 100
          max-idle: 10
          min-idle: 5
        shutdown-timeout: 200
  rabbitmq:
    host: 111.230.105.54
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
  threads:
    virtual:
      enabled: true
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.vnollxonlinejudge.model.entity
  configuration:
    default-executor-type: batch
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# AI 代理配置
ai:
  proxy:
    url: http://74.122.24.92:8000
    timeout: 300

# Resilience4j 熔断配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      judgeService:
        baseConfig: default
        slidingWindowSize: 20
        failureRateThreshold: 60
      aiService:
        baseConfig: default
        failureRateThreshold: 40
        waitDurationInOpenState: 120s
