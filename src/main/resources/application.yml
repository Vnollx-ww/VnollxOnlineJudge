spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: VnollxOnlineJudge
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:mysql-master}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:vnollxonlinejudge}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
          username: root
          password: ${MYSQL_ROOT_PASSWORD:rootpassword}
          type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 10000
      connect-timeout: 10000
      lettuce:
        pool:
          max-active: 100
          max-idle: 10
          min-idle: 5
        shutdown-timeout: 200
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:2720741614@qq.com}
    password: ${MAIL_PASSWORD:jfccwlsdynqfdchg}
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:vnollxvnollx}
  secret-key: ${MINIO_SECRET_KEY:vnollxvnollxvnollx}

go-judge:
  endpoint: ${GO_JUDGE_ENDPOINT:http://go-judge:5050}

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.vnollxonlinejudge.model.entity
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
    loggers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# AI 代理配置（按模型 proxy_type 选择：国内走 domestic，国外走 overseas）
ai:
  proxy:
    domestic:
      url: ${AI_PROXY_DOMESTIC_URL:http://ai-proxy:8000}
    overseas:
      url: ${AI_PROXY_OVERSEAS_URL:http://ai-proxy:8000}
    timeout: ${AI_PROXY_TIMEOUT:300}

# Resilience4j 熔断配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      judgeService:
        baseConfig: default
        slidingWindowSize: 20
        failureRateThreshold: 60
      aiService:
        baseConfig: default
        failureRateThreshold: 40
        waitDurationInOpenState: 120s
